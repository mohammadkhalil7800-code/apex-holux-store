<!DOCTYPE html>
<html>
<head>
  <title>Apex Holux Global Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{margin:0;font-family:Arial;background:#f3f3f3}

    header{
      background:black;color:white;padding:15px;
      display:flex;justify-content:space-between
    }

    #search, select{
      width:90%;margin:10px auto;display:block;
      padding:10px;border-radius:5px;border:1px solid #ccc
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
      gap:10px;padding:10px
    }

    .card{
      background:white;padding:10px;border-radius:10px;
      text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.2)
    }

    img{width:100%;height:140px;object-fit:cover}

    button{
      padding:6px;margin:3px;border:none;border-radius:5px;
      cursor:pointer;font-size:12px
    }

    .buy{background:orange}
    .cart{background:green;color:white}
    .remove{background:red;color:white}

    #cartBox{
      background:white;margin:10px;padding:10px;border-radius:10px
    }
  </style>
</head>

<body>

<header>
  <div>🌍 Apex Holux</div>
  <div>🛒 <span id="count">0</span></div>
</header>

<input id="search" placeholder="🔎 Search...">

<select id="filter">
  <option>All</option>
  <option>Sneakers</option>
  <option>Slides</option>
  <option>Running</option>
  <option>Budget</option>
</select>

<div class="grid" id="products"></div>

<div id="cartBox">
  <h3>🛒 Cart</h3>
  <div id="cart"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="checkout()">Checkout</button>
</div>

<script>

// 🌍 PRODUCTS
const products = [
{id:1,name:"Nike Air Force 1",price:90,cat:"Sneakers",img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{id:2,name:"Adidas Ultraboost",price:120,cat:"Running",img:"https://images.unsplash.com/photo-1519741497674-611481863552"},
{id:3,name:"Air Jordan 1 Low",price:140,cat:"Sneakers",img:"https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb"},
{id:4,name:"Skechers Walking",price:70,cat:"Running",img:"https://images.unsplash.com/photo-1528701800489-20be3c6a4c6a"},
{id:5,name:"Nike Slides",price:45,cat:"Slides",img:"https://images.unsplash.com/photo-1608231387042-66d1773070a5"},
{id:6,name:"Budget Shoes",price:25,cat:"Budget",img:"https://images.unsplash.com/photo-1528701800489-20be3c6a4c6a"}
];

let cart=[];

// 🔥 RENDER
function render(list){
  let c=document.getElementById("products");
  c.innerHTML="";

  list.forEach(p=>{
    c.innerHTML+=`
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>${p.cat}</p>
        <p>$${p.price}</p>

        <button class="buy" onclick="buyNow('${p.name}',${p.price})">⚡ Buy</button>
        <button class="cart" onclick="add(${p.id})">🛒 Add</button>
      </div>
    `;
  });
}

// 🛒 ADD (NO DUPLICATE)
function add(id){
  let p=products.find(x=>x.id===id);
  let item=cart.find(i=>i.id===id);

  if(item){
    item.qty++;
  }else{
    cart.push({...p,qty:1});
  }

  updateCart();
}

// ❌ REMOVE
function removeItem(id){
  cart=cart.filter(i=>i.id!==id);
  updateCart();
}

// 🧾 CART
function updateCart(){
  let div=document.getElementById("cart");
  let total=0;

  div.innerHTML="";

  cart.forEach(i=>{
    total+=i.price*i.qty;

    div.innerHTML+=`
      <p>
        ${i.name} x${i.qty} = $${i.price*i.qty}
        <button class="remove" onclick="removeItem(${i.id})">❌</button>
      </p>
    `;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=cart.length;
}

// ⚡ BUY
function buyNow(name,price){
  window.open("https://wa.me/93764594322?text=Buy:"+name+" $"+price);
}

// 📦 CHECKOUT
function checkout(){
  if(cart.length==0)return alert("Cart empty");

  let total=cart.reduce((s,i)=>s+i.price*i.qty,0);

  let msg="ORDER:%0A";
  cart.forEach(i=>{
    msg+=`${i.name} x${i.qty} = $${i.price*i.qty}%0A`;
  });

  msg+=`TOTAL: $${total}`;

  window.open("https://wa.me/93764594322?text="+msg);

  cart=[];
  updateCart();
}

// 🔎 SEARCH + FILTER
function filterProducts(){
  let search=document.getElementById("search").value.toLowerCase();
  let cat=document.getElementById("filter").value;

  let filtered=products.filter(p=>
    p.name.toLowerCase().includes(search) &&
    (cat==="All" || p.cat===cat)
  );

  render(filtered);
}

document.getElementById("search").addEventListener("input",filterProducts);
document.getElementById("filter").addEventListener("change",filterProducts);

render(products);

</script>

</body>
</html>
