<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Holux Global Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f3f3f3;
}

/* HEADER */
header {
  background: #131921;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

input {
  padding: 8px;
  width: 200px;
}

/* PRODUCTS */
#products {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

/* BUTTON */
button {
  padding: 8px;
  margin: 5px;
  border: none;
  cursor: pointer;
}

.buy { background: orange; }
.cart { background: #ffd814; }

/* CART */
#cartBox {
  background: white;
  padding: 15px;
  margin: 20px;
}
</style>
</head>

<body>

<header>
  <h2>🌍 Apex Holux Store</h2>
  <input id="search" placeholder="Search shoes...">
</header>

<div id="products"></div>

<div id="cartBox">
  <h3>🛒 Cart</h3>
  <div id="cart"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="checkout()">Checkout</button>
</div>

<script>

/* 🌍 GLOBAL TOP PRODUCTS */
const products = [
  {id:1,name:"Nike Air Force 1",price:90,img:"https://i.imgur.com/1.jpg"},
  {id:2,name:"Adidas Ultraboost",price:120,img:"https://i.imgur.com/2.jpg"},
  {id:3,name:"Nike Slides",price:45,img:"https://i.imgur.com/3.jpg"},
  {id:4,name:"Adidas Slides",price:40,img:"https://i.imgur.com/4.jpg"},
  {id:5,name:"Skechers Memory Foam",price:70,img:"https://i.imgur.com/5.jpg"},
  {id:6,name:"Skechers Sandals",price:55,img:"https://i.imgur.com/6.jpg"},
  {id:7,name:"Jordan 1 Low",price:140,img:"https://i.imgur.com/7.jpg"},
  {id:8,name:"Puma RS-X",price:85,img:"https://i.imgur.com/8.jpg"},
  {id:9,name:"New Balance 574",price:95,img:"https://i.imgur.com/9.jpg"},
  {id:10,name:"Luxury Slides",price:50,img:"https://i.imgur.com/10.jpg"}
];

let cart = [];

/* 🔥 RENDER PRODUCTS */
function render(list){
  const box = document.getElementById("products");
  box.innerHTML = "";

  list.forEach(p=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>$${p.price}</p>

        <button class="buy" onclick="buyNow(${p.id})">Buy Now</button>
        <button class="cart" onclick="addCart(${p.id})">Add Cart</button>
      </div>
    `;
  });
}

/* 🛒 ADD CART */
function addCart(id){
  let item = cart.find(x=>x.id===id);
  let p = products.find(x=>x.id===id);

  if(item) item.qty++;
  else cart.push({...p,qty:1});

  renderCart();
}

/* ⚡ BUY NOW */
function buyNow(id){
  cart = [];
  addCart(id);
  checkout();
}

/* 🧾 CART */
function renderCart(){
  let total = 0;
  let html = "";

  cart.forEach(i=>{
    total += i.price*i.qty;
    html += `<p>${i.name} x${i.qty} = $${i.price*i.qty}</p>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;
}

/* 📲 CHECKOUT (WhatsApp) */
function checkout(){
  if(cart.length===0) return alert("Cart empty");

  let msg="ORDER:\n";

  cart.forEach(i=>{
    msg+=`${i.name} x${i.qty}\n`;
  });

  window.open("https://wa.me/93764594322?text="+encodeURIComponent(msg));
}

/* 🔍 SEARCH */
document.getElementById("search").oninput = (e)=>{
  let val = e.target.value.toLowerCase();
  let filtered = products.filter(p=>p.name.toLowerCase().includes(val));
  render(filtered);
};

render(products);

</script>

</body>
</html>
