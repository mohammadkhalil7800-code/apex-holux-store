<div class="grid" id="products"></div>

<div id="cartBox">
  <h3>🛒 Cart (<span id="count">0</span>)</h3>
  <div id="cart"></div>
  <h3>Total: $<span id="total">0</span></h3>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "apex-holux-global-store.firebaseapp.com",
  projectId: "apex-holux-global-store"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("products");

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let allProducts = [];

// 🌍 FALLBACK BEST SELLING PRODUCTS
const fallback = [
  {name:"Nike Air Force 1",price:90,image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
  {name:"Adidas Ultraboost",price:120,image:"https://images.unsplash.com/photo-1519741497674-611481863552"},
  {name:"Air Jordan 1 Low",price:140,image:"https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb"},
  {name:"Skechers Walking Shoes",price:70,image:"https://images.unsplash.com/photo-1528701800489-20be3c6a4c6a"},
  {name:"Nike Slides",price:45,image:"https://images.unsplash.com/photo-1608231387042-66d1773070a5"},
  {name:"Adidas Slides",price:40,image:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba3"},
  {name:"New Balance Running",price:95,image:"https://images.unsplash.com/photo-1526178613658-3f1622045557"},
  {name:"Puma Sports Shoes",price:75,image:"https://images.unsplash.com/photo-1608231387042-66d1773070a5"}
];

// 🔥 LOAD PRODUCTS FROM FIREBASE
async function loadProducts(){
  try{
    const snap = await getDocs(collection(db,"products"));
    snap.forEach(doc=>{
      allProducts.push(doc.data());
    });
  }catch(e){
    console.log("Firebase error, using fallback");
  }

  if(allProducts.length === 0){
    allProducts = fallback;
  }

  render(allProducts);
}

function render(products){
  container.innerHTML = "";

  products.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h4>${p.name}</h4>
        <p>$${p.price}</p>

        <button class="buy" onclick="buyNow('${p.name}',${p.price})">⚡ Buy</button>
        <button class="cart" onclick="add('${p.name}',${p.price})">🛒</button>
      </div>
    `;
  });
}

// 🛒 CART
window.add = (name,price)=>{
  cart.push({name,price});
  save();
}

window.buyNow = (name,price)=>{
  let msg = `ORDER:%0A${name} - $${price}`;
  window.open("https://wa.me/93764594322?text="+msg);
}

function save(){
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  let div = document.getElementById("cart");
  let total = 0;

  div.innerHTML = "";

  cart.forEach(i=>{
    total += i.price;
    div.innerHTML += `<p>${i.name} - $${i.price}</p>`;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = cart.length;
}

// 🔎 SEARCH
document.getElementById("search").addEventListener("input",(e)=>{
  let val = e.target.value.toLowerCase();

  let filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(val)
  );

  render(filtered);
});

loadProducts();
renderCart();

</script>

</body>
</html>
