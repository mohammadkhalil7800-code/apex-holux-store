<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌍 GLOBAL AMAZON 4.0 ULTIMATE</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#111;color:white;padding:15px;text-align:center;font-size:20px}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

button{
width:100%;
padding:8px;
margin-top:5px;
background:#ff9900;
border:none;
cursor:pointer;
font-weight:bold;
}

#cartBox,#admin{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
}

input{
padding:8px;
margin:5px;
width:90%;
}
</style>

</head>

<body>

<header>🌍 AMAZON 4.0 ULTIMATE (AI STORE LEVEL)</header>

<!-- AUTH -->
<div id="authBox">
<h3>🔐 Login</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
<h3>🏬 Admin Panel</h3>
<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="addProduct()">➕ Add Product</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="container"></div>

<!-- CART -->
<div id="cartBox">
<h3>🛒 Cart</h3>
<div id="cart"></div>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="checkoutWhatsApp()">WhatsApp Order</button>
<button onclick="checkoutStripe()">💳 Stripe Pay (Demo)</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* PRODUCTS (GLOBAL BEST SELLERS) */
let products = [
{name:"Nike Air Force 1",price:90,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{name:"Adidas Ultraboost",price:120,img:"https://images.unsplash.com/photo-1528701800489-20be3c5c9c8c"},
{name:"Nike Air Max",price:130,img:"https://images.unsplash.com/photo-1519744346364"},
{name:"Puma RS-X",price:95,img:"https://images.unsplash.com/photo-1606813907291"},
{name:"Classic Oxford Shoes",price:110,img:"https://images.unsplash.com/photo-1521334884684"},
{name:"Jordan Retro 4",price:180,img:"https://images.unsplash.com/photo-1600180758890"},
{name:"Vans Old Skool",price:70,img:"https://images.unsplash.com/photo-1549298916"},
{name:"New Balance 574",price:95,img:"https://images.unsplash.com/photo-1519741497674"},
{name:"Nike Slides",price:45,img:"https://images.unsplash.com/photo-1597047084897"},
{name:"Adidas Slides",price:40,img:"https://images.unsplash.com/photo-1606813902913"}
];

let cart=[];

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";
products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="add(${i})">Add</button>
</div>`;
});
}
render();

/* ADD CART */
window.add=function(i){
cart.push(products[i]);
renderCart();
}

/* CART */
function renderCart(){
let c=document.getElementById("cart");
let total=0;
c.innerHTML="";

cart.forEach(p=>{
total+=p.price;
c.innerHTML+=`<p>${p.name} - $${p.price}</p>`;
});

document.getElementById("total").innerText=total;
updateDashboard();
}

/* WHATSAPP */
window.checkoutWhatsApp=function(){
let msg="🛒 ORDER:\n";
let total=0;

cart.forEach(p=>{
msg+=p.name+" - $"+p.price+"\n";
total+=p.price;
});

msg+="TOTAL: $"+total;

window.open("https://wa.me/93764594322?text="+encodeURIComponent(msg));
}

/* STRIPE (DEMO LINK) */
window.checkoutStripe=function(){
alert("Stripe mode ready (connect backend)");
}

/* LOGIN */
window.login=function(){
signInWithEmailAndPassword(auth,email.value,pass.value)
.then(()=>alert("Logged in"))
.catch(e=>alert(e.message));
}

/* ADMIN ADD PRODUCT */
window.addProduct=function(){
let name=pname.value;
let price=Number(pprice.value);
let img=pimg.value;

if(!name||!price) return;

products.push({name,price,img});
render();
}

/* DASHBOARD */
function updateDashboard(){
document.getElementById("dashboard").innerHTML=`
<div style="padding:10px;">
<h3>📊 Dashboard</h3>
<p>Products: ${products.length}</p>
<p>Cart Items: ${cart.length}</p>
<p>Total Value: $${cart.reduce((a,b)=>a+b.price,0)}</p>
</div>`;
}

updateDashboard();

</script>

</body>
</html>
