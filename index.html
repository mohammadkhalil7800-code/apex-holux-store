
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WORLD AMAZON FINAL BOSS</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#0d0d0d;color:#fff;padding:15px;text-align:center;font-size:22px;font-weight:bold}

.topbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;padding:10px}
input,button{padding:10px;border-radius:6px;border:1px solid #ccc}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
  box-shadow:0 3px 12px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.panel{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.dark{background:#111;color:white}
</style>
</head>

<body>

<header>🌍 WORLD AMAZON FINAL BOSS STORE</header>

<div class="topbar">
  <input id="search" placeholder="Search products..." oninput="searchProducts(this.value)">
  <button onclick="toggleDark()">🌙</button>
  <button onclick="showLogin()">👤 Login</button>
  <button onclick="toggleAdmin()">👑 Admin</button>
</div>

<!-- LOGIN -->
<div id="loginBox" class="panel" style="display:none">
  <h3>Login / Signup</h3>
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="panel" style="display:none">
  <h3>ADMIN PANEL (LIVE CONTROL)</h3>
  <input id="pName" placeholder="Product name">
  <input id="pPrice" placeholder="Price">
  <input id="pImg" placeholder="Image URL">
  <button onclick="addProduct()">➕ Add Product</button>
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<!-- CART -->
<div class="panel">
  <h3>🛒 CART</h3>
  <div id="cart"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="checkout()">Checkout WhatsApp</button>
</div>

<!-- DASHBOARD -->
<div class="panel">
  <h3>📊 DASHBOARD</h3>
  <div id="dashboard"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "apex-holux-global-store.firebaseapp.com",
  projectId: "apex-holux-global-store"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 FINAL BOSS PRODUCTS (GLOBAL TOP SELLERS)
let products = [
 {name:"Nike Air Force 1",price:90,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
 {name:"Adidas Ultraboost",price:120,img:"https://images.unsplash.com/photo-1528701800489-20be3c5c9c8c"},
 {name:"Nike Air Max 270",price:130,img:"https://images.unsplash.com/photo-1519744346364-3b46e0d4d5e7"},
 {name:"Puma RS-X",price:95,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
 {name:"Sketchers Walk Pro",price:75,img:"https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a"},
 {name:"Jordan Retro 4",price:180,img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba6"},
 {name:"Vans Old Skool",price:70,img:"https://images.unsplash.com/photo-1549298916-b41d501d3772"},
 {name:"New Balance 574",price:95,img:"https://images.unsplash.com/photo-1519741497674-611481863552"},
 {name:"Nike Slides",price:45,img:"https://images.unsplash.com/photo-1597047084897-51e81819a499"},
 {name:"Adidas Slides",price:40,img:"https://images.unsplash.com/photo-1606813902913-1f3e92d1c3d5"}
];

let cart=[];
let total=0;
let isAdmin=false;

// DISPLAY PRODUCTS
function render(list){
  const box=document.getElementById("products");
  box.innerHTML="";

  list.forEach((p,i)=>{
    box.innerHTML+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
      <button onclick="addToCart(${i})">🛒 Add</button>
    </div>`;
  });

  updateDashboard();
}

// CART
window.addToCart=(i)=>{
  cart.push(products[i]);
  total+=products[i].price;

  document.getElementById("cart").innerHTML+=`<p>${products[i].name}</p>`;
  document.getElementById("total").innerText=total;

  updateDashboard();
}

// SEARCH
window.searchProducts=(v)=>{
  render(products.filter(p=>p.name.toLowerCase().includes(v.toLowerCase())));
}

// CHECKOUT
window.checkout=()=>{
  let msg="🛒 FINAL ORDER\n\n";

  cart.forEach(i=>{
    msg+=i.name+" - $"+i.price+"\n";
  });

  msg+="\nTOTAL: $"+total;

  window.open("https://wa.me/93764594322?text="+encodeURIComponent(msg));
}

// DARK MODE
window.toggleDark=()=>{
  document.body.classList.toggle("dark");
}

// ADMIN
window.toggleAdmin=()=>{
  isAdmin=!isAdmin;
  document.getElementById("adminPanel").style.display=isAdmin?"block":"none";
}

// ADD PRODUCT (LIVE)
window.addProduct=()=>{
  products.push({
    name:document.getElementById("pName").value,
    price:document.getElementById("pPrice").value,
    img:document.getElementById("pImg").value
  });

  render(products);
}

// LOGIN SYSTEM
window.showLogin=()=>{
  document.getElementById("loginBox").style.display="block";
}

window.signup=()=>{
  createUserWithEmailAndPassword(
    auth,
    email.value,
    password.value
  );
  alert("Signup success");
}

window.login=()=>{
  signInWithEmailAndPassword(
    auth,
    email.value,
    password.value
  );
  alert("Login success");
}

// DASHBOARD (REAL TIME STATS)
function updateDashboard(){
  document.getElementById("dashboard").innerHTML=`
    <p>🔥 Products: ${products.length}</p>
    <p>🛒 Cart Items: ${cart.length}</p>
    <p>💰 Session Revenue: $${total}</p>
  `;
}

// INIT
render(products);

</script>

</body>
</html>
