<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌍 AMAZON GOD MODE STORE</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{
  background:#131921;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
}

.top{
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}

input,button{
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  background:#ff9900;
  border:none;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.panel{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.dark{background:#111;color:white;}
</style>
</head>

<body>

<header>🌍 AMAZON GOD MODE STORE</header>

<div class="top">
<input id="search" placeholder="Search premium shoes...">
<button onclick="toggleDark()">🌙</button>
</div>

<!-- AUTH -->
<div class="panel">
<h3>👤 Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div class="panel">
<h3>👑 Admin Panel</h3>
<input id="pname" placeholder="Product name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<div class="grid" id="products"></div>

<!-- CART -->
<div class="panel">
<h3>🛒 Cart</h3>
<div id="cart"></div>
<h3>Total: $<span id="total">0</span></h3>
<button onclick="checkout()">WhatsApp Order</button>
</div>

<!-- DASHBOARD -->
<div class="panel">
<h3>📊 Dashboard</h3>
<p id="dash">Orders: 0</p>
</div>

<script type="module">

/* ===== FIREBASE ===== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "apex-holux-global-store.firebaseapp.com",
  projectId: "apex-holux-global-store"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ===== DATA ===== */
let products=[
{name:"Nike Air Force 1",price:90,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{name:"Adidas Ultraboost",price:120,img:"https://images.unsplash.com/photo-1528701800489-20be3c5c9c8c"},
{name:"Jordan Retro 4",price:180,img:"https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a"},
{name:"Vans Old Skool",price:70,img:"https://images.unsplash.com/photo-1549298916-b41d501d3772"},
{name:"Sketchers Walk Pro",price:75,img:"https://images.unsplash.com/photo-1582588678413-dbf45f4823e9"}
];

let cart=[];
let total=0;
let orders=0;

/* ===== AUTH ===== */
window.signup=async()=>{
  await createUserWithEmailAndPassword(auth,email.value,pass.value);
  alert("Account Created");
}

window.login=async()=>{
  await signInWithEmailAndPassword(auth,email.value,pass.value);
  alert("Logged In");
}

/* ===== UI ===== */
function render(){
  let box=document.getElementById("products");
  box.innerHTML="";
  products.forEach((p,i)=>{
    box.innerHTML+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
      <button onclick="add(${i})">Add</button>
    </div>`;
  });
}

window.add=(i)=>{
  cart.push(products[i]);
  total+=products[i].price;

  document.getElementById("cart").innerHTML+=`<p>${products[i].name}</p>`;
  document.getElementById("total").innerText=total;
}

/* SEARCH */
search.oninput=(e)=>{
  let v=e.target.value.toLowerCase();
  let f=products.filter(p=>p.name.toLowerCase().includes(v));
  let box=document.getElementById("products");
  box.innerHTML="";
  f.forEach((p,i)=>{
    box.innerHTML+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
      <button onclick="add(${i})">Add</button>
    </div>`;
  });
}

/* CHECKOUT */
window.checkout=()=>{
  let msg="🛒 ORDER\n\n";
  cart.forEach(i=>msg+=i.name+"\n");
  msg+="\nTOTAL: $"+total;

  window.open("https://wa.me/93764594322?text="+encodeURIComponent(msg));

  orders++;
  dash.innerText="Orders: "+orders;

  cart=[]; total=0;
  document.getElementById("cart").innerHTML="";
  document.getElementById("total").innerText=0;
}

/* DARK */
window.toggleDark=()=>{
  document.body.classList.toggle("dark");
}

render();

</script>

</body>
</html>
