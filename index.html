<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apex Holux Global Store</title>

<style>
body {margin:0; font-family:Arial; background:#f3f3f3;}

header {
  background:#131921;
  color:white;
  padding:15px;
  text-align:center;
}

.search {
  width:80%;
  padding:10px;
  margin-top:10px;
}

.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:white;
  border-radius:10px;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
  transition:0.3s;
}
.card:hover {transform:scale(1.05);}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

button {
  background:#ff9900;
  border:none;
  padding:10px;
  margin-top:5px;
  cursor:pointer;
  width:100%;
}

.cart {
  background:white;
  margin:20px;
  padding:20px;
}

</style>
</head>

<body>

<header>
  <h1>🌍 Apex Holux Global Store</h1>
  <input class="search" placeholder="Search shoes..." oninput="searchProducts(this.value)">
</header>

<div class="container" id="products"></div>

<div class="cart">
  <h2>🛒 Cart</h2>
  <div id="cart"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="checkout()">Order on WhatsApp</button>
</div>

<script>

const products = [
{ name:"Nike Air Force 1", price:90, img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{ name:"Adidas Ultraboost", price:120, img:"https://images.unsplash.com/photo-1528701800489-20be3c5c9c8c"},
{ name:"Nike Air Max 270", price:130, img:"https://images.unsplash.com/photo-1519744346364-3b46e0d4d5e7"},
{ name:"Puma RS-X", price:95, img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
{ name:"Jordan Retro 4", price:180, img:"https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a"},
{ name:"Air Jordan 1 Low", price:140, img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba6"},
{ name:"Converse Classic", price:65, img:"https://images.unsplash.com/photo-1528702748617-c64d49f918af"},
{ name:"Vans Old Skool", price:70, img:"https://images.unsplash.com/photo-1549298916-b41d501d3772"},
{ name:"New Balance 574", price:95, img:"https://images.unsplash.com/photo-1519741497674-611481863552"},
{ name:"Skechers Go Walk", price:75, img:"https://images.unsplash.com/photo-1582588678413-dbf45f4823e9"},
{ name:"Nike Slides", price:45, img:"https://images.unsplash.com/photo-1597047084897-51e81819a499"},
{ name:"Adidas Slides", price:40, img:"https://images.unsplash.com/photo-1606813902913-1f3e92d1c3d5"}
];

let cart = [];
let total = 0;

function renderProducts(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(name,price){
  cart.push({name,price});
  total += price;

  document.getElementById("cart").innerHTML += `<p>${name}</p>`;
  document.getElementById("total").innerText = total;
}

function searchProducts(val){
  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(val.toLowerCase())
  );
  renderProducts(filtered);
}

function checkout(){
  if(cart.length === 0){
    alert("Cart empty!");
    return;
  }

  let msg = "🛒 Order:\n";
  cart.forEach(i => msg += i.name + "\n");
  msg += "Total: $" + total;

  window.open("https://wa.me/93764594322?text="+encodeURIComponent(msg));
}

renderProducts(products);

</script>

</body>
</html>
