<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌍 Apex Holux GLOBAL PRO STORE</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#111;color:#fff;padding:15px;text-align:center;font-size:20px}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

button{
width:100%;
padding:8px;
margin-top:5px;
cursor:pointer;
background:#ff9900;
border:none;
}

#cartBox{
background:#fff;
padding:15px;
margin:15px;
border-radius:10px;
}

.authBox{
padding:10px;
background:#fff;
margin:10px;
border-radius:10px;
}

input{
padding:8px;
margin:5px;
width:90%;
}
</style>

</head>

<body>

<header>🌍 Apex Holux GLOBAL PRO STORE (FINAL AMAZON LEVEL)</header>

<!-- AUTH -->
<div class="authBox">
<h3>🔐 Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<p id="userStatus">Not logged in</p>
</div>

<!-- PRODUCTS -->
<div id="products" class="container"></div>

<!-- CART -->
<div id="cartBox">
<h3>🛒 Cart</h3>
<div id="cart"></div>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="checkout()">Checkout WhatsApp</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* USER */
let currentUser = null;

/* 💎 TOP GLOBAL PRODUCTS (HIGH DEMAND) */
const products = [
{name:"Nike Air Force 1",price:90,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{name:"Adidas Ultraboost",price:120,img:"https://images.unsplash.com/photo-1528701800489-20be3c5c9c8c"},
{name:"Nike Air Max 270",price:130,img:"https://images.unsplash.com/photo-1519744346364-7eec264c27ff"},
{name:"Puma RS-X",price:95,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
{name:"Skechers Walk",price:75,img:"https://images.unsplash.com/photo-1582588678413-dbf45f4823e9"},
{name:"Jordan Retro 4",price:180,img:"https://images.unsplash.com/photo-1600180758890"},
{name:"Vans Old Skool",price:70,img:"https://images.unsplash.com/photo-1549298916-b41d501d3772"},
{name:"New Balance 574",price:95,img:"https://images.unsplash.com/photo-1519741497674"},
{name:"Converse Classic",price:65,img:"https://images.unsplash.com/photo-1528702748617"},
{name:"Nike Slides",price:45,img:"https://images.unsplash.com/photo-1597047084897"}
];

let cart=[];

/* SHOW PRODUCTS */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="add(${i})">Add to Cart</button>
</div>`;
});
}
render();

/* ADD CART */
window.add=function(i){
cart.push(products[i]);
renderCart();
}

/* CART */
function renderCart(){
let c=document.getElementById("cart");
let total=0;
c.innerHTML="";

cart.forEach(p=>{
total+=p.price;
c.innerHTML+=`<p>${p.name} - $${p.price}</p>`;
});

document.getElementById("total").innerText=total;
}

/* CHECKOUT (YOUR NUMBER ADDED) */
window.checkout=function(){

if(cart.length===0){
alert("Cart empty!");
return;
}

let msg="🛒 ORDER FROM APEX HOLUX\n\n";
let total=0;

cart.forEach(p=>{
msg+=p.name+" - $"+p.price+"\n";
total+=p.price;
});

msg+="\nTOTAL: $"+total;

/* 🔥 YOUR NUMBER ADDED */
let phone="+93764594322";

window.open(
"https://wa.me/"+phone+"?text="+encodeURIComponent(msg),
"_blank"
);
}

/* AUTH */
window.signup=function(){
createUserWithEmailAndPassword(auth,email.value,pass.value)
.then(()=>alert("Signup OK"))
.catch(e=>alert(e.message));
}

window.login=function(){
signInWithEmailAndPassword(auth,email.value,pass.value)
.then(()=>alert("Login OK"))
.catch(e=>alert(e.message));
}

onAuthStateChanged(auth,(user)=>{
currentUser=user;
document.getElementById("userStatus").innerText=
user ? "Logged in: "+user.email : "Not logged in";
});

</script>

</body>
</html>
