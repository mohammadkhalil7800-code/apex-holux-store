<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "apex-holux-global-store.firebaseapp.com",
  projectId: "apex-holux-global-store",
  storageBucket: "apex-holux-global-store.firebasestorage.app",
  messagingSenderId: "14825121288",
  appId: "1:14825121288:web:a46ba39d55894efa0453bd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("products");

let allProducts = [];

// 🧠 USER SYSTEM
let user = JSON.parse(localStorage.getItem("user")) || {
  id: "user_" + Math.random().toString(36).substr(2,9),
  name: "Guest"
};
localStorage.setItem("user", JSON.stringify(user));

// 🛒 DATA
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || {};

function saveCart(){ localStorage.setItem("cart", JSON.stringify(cart)); updateBadges(); }
function saveWishlist(){ localStorage.setItem("wishlist", JSON.stringify(wishlist)); updateBadges(); }
function saveOrders(){ localStorage.setItem("orders", JSON.stringify(orders)); }

// ⏳ LOADING
container.innerHTML = "⏳ Loading products...";

// 🔥 LOAD PRODUCTS
async function loadProducts(){
  const snapshot = await getDocs(collection(db, "products"));

  allProducts = [];
  snapshot.forEach(doc => {
    allProducts.push({ id: doc.id, ...doc.data() });
  });

  renderProducts(allProducts);
  renderCart();
  updateBadges();
}

// 🧼 SAFE
function safe(t){
  return String(t || "")
    .replaceAll("<","")
    .replaceAll(">","");
}

// ⭐ BUY NOW (Amazon style)
window.buyNow = function(id,name,price){
  cart = [{ id, name, price, qty: 1 }];
  saveCart();
  checkoutCart();
}

// 🛒 ADD CART
window.addToCart = function(id,name,price){

  let item = cart.find(i => i.id === id);

  if(item) item.qty++;
  else cart.push({ id, name, price, qty: 1 });

  saveCart();
  renderCart();
}

// ❤️ WISHLIST
window.toggleWishlist = function(id){
  wishlist.includes(id)
    ? wishlist = wishlist.filter(i => i !== id)
    : wishlist.push(id);

  saveWishlist();
  renderProducts(allProducts);
}

// 🔎 SEARCH + FILTER
document.getElementById("search").addEventListener("input",(e)=>{

  const val = e.target.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    (p.name || "").toLowerCase().includes(val) ||
    (p.category || "").toLowerCase().includes(val)
  );

  renderProducts(filtered);
});

// 🔥 RENDER PRODUCTS (Amazon UI style)
function renderProducts(products){

  container.innerHTML = "";

  products.forEach(p => {

    let rating = p.rating || (Math.random()*2 + 3).toFixed(1);
    let stars = "⭐".repeat(Math.round(rating));

    const isFav = wishlist.includes(p.id);

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/150'">

        <h3>${safe(p.name)}</h3>

        <p>${stars} (${rating})</p>
        <p><b>$${p.price}</b></p>

        <button onclick="buyNow('${p.id}','${safe(p.name)}',${p.price})">
          ⚡ Buy Now
        </button>

        <button onclick="addToCart('${p.id}','${safe(p.name)}',${p.price})">
          🛒 Add
        </button>

        <button onclick="toggleWishlist('${p.id}')">
          ${isFav ? "❤️ Saved" : "🤍 Wishlist"}
        </button>
      </div>
    `;
  });
}

// 🧾 CART RENDER
function renderCart(){

  const cartDiv = document.getElementById("cart");
  const totalSpan = document.getElementById("total");

  let total = 0;

  cartDiv.innerHTML = cart.length ? "" : "<p>Cart empty</p>";

  cart.forEach((item,i)=>{

    total += item.price * item.qty;

    cartDiv.innerHTML += `
      <p>
        ${item.name} x${item.qty}
        = $${item.price * item.qty}
        <button onclick="removeItem(${i})">❌</button>
      </p>
    `;
  });

  totalSpan.innerText = total;
}

// ❌ REMOVE
window.removeItem = function(i){
  cart.splice(i,1);
  saveCart();
  renderCart();
}

// 🧹 CLEAR
window.clearCart = function(){
  cart = [];
  saveCart();
  renderCart();
}

// 📦 CHECKOUT (WhatsApp + Orders)
window.checkoutCart = function(){

  if(cart.length === 0) return alert("Cart empty!");

  let id = "ORD-" + Date.now();
  let total = 0;

  let msg = `🛒 ORDER\nID:${id}\nUser:${user.name}\n\n`;

  cart.forEach(i=>{
    total += i.price * i.qty;
    msg += `${i.name} x${i.qty} = $${i.price*i.qty}\n`;
  });

  msg += `\nTOTAL: $${total}`;

  orders[id] = {
    id,
    user,
    items:[...cart],
    total,
    date:new Date().toISOString()
  };

  saveOrders();

  cart = [];
  saveCart();
  renderCart();

  window.open("https://wa.me/93764594322?text="+encodeURIComponent(msg));
}

// 📊 BADGES (wishlist + cart)
function updateBadges(){
  document.getElementById("cartCount")?.innerText = cart.length;
  document.getElementById("wishCount")?.innerText = wishlist.length;
}

loadProducts();

</script>
