<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌍 GLOBAL AMAZON 3.0</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#111;color:#fff;padding:15px;text-align:center;font-size:20px}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

button{
width:100%;
padding:8px;
margin-top:5px;
cursor:pointer;
background:#ff9900;
border:none;
font-weight:bold;
}

#cartBox{
background:#fff;
padding:15px;
margin:15px;
border-radius:10px;
}

.authBox{
padding:10px;
background:#fff;
margin:10px;
border-radius:10px;
}

input{
padding:8px;
margin:5px;
width:90%;
}
</style>

</head>

<body>

<header>🌍 GLOBAL AMAZON 3.0 (SPORT + CLASSIC + SNEAKERS)</header>

<!-- AUTH -->
<div class="authBox">
<h3>🔐 Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<p id="userStatus">Not logged in</p>
</div>

<!-- PRODUCTS -->
<div id="products" class="container"></div>

<!-- CART -->
<div id="cartBox">
<h3>🛒 Cart</h3>
<div id="cart"></div>
<h3>Total: $<span id="total">0</span></h3>
<button onclick="checkout()">Checkout WhatsApp</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 👟 GLOBAL BEST SELLERS (UPDATED PRO LEVEL) */
const products = [

/* 🔥 SPORT SHOES */
{name:"Nike Air Zoom Running",price:110,img:"https://images.unsplash.com/photo-1528701800489-20be3c5c9c8c"},
{name:"Adidas Running Boost",price:125,img:"https://images.unsplash.com/photo-1519744346364-7eec264c27ff"},
{name:"Puma Velocity Sport",price:95,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},

/* 👟 SNEAKERS */
{name:"Nike Air Force 1 White",price:90,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{name:"Jordan Retro 4 Black",price:180,img:"https://images.unsplash.com/photo-1600180758890"},
{name:"Vans Old Skool Classic",price:70,img:"https://images.unsplash.com/photo-1549298916-b41d501d3772"},

/* 👞 CLASSIC SHOES */
{name:"Leather Classic Formal",price:85,img:"https://images.unsplash.com/photo-1528702748617"},
{name:"Oxford Business Shoes",price:95,img:"https://images.unsplash.com/photo-1521334884684"},
{name:"Brown Luxury Classic",price:120,img:"https://images.unsplash.com/photo-1582588678413-dbf45f4823e9"},

/* 🩴 SLIDES */
{name:"Nike Slides Comfort",price:45,img:"https://images.unsplash.com/photo-1597047084897"},
{name:"Adidas Slides Sport",price:40,img:"https://images.unsplash.com/photo-1606813902913"}

];

let cart=[];

/* RENDER */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="add(${i})">Add to Cart</button>
</div>`;
});
}
render();

/* CART */
window.add=function(i){
cart.push(products[i]);
renderCart();
}

/* CART UI */
function renderCart(){
let c=document.getElementById("cart");
let total=0;
c.innerHTML="";

cart.forEach(p=>{
total+=p.price;
c.innerHTML+=`<p>${p.name} - $${p.price}</p>`;
});

document.getElementById("total").innerText=total;
}

/* CHECKOUT */
window.checkout=function(){

if(cart.length===0){
alert("Cart empty!");
return;
}

let msg="🛒 GLOBAL AMAZON 3.0 ORDER\n\n";
let total=0;

cart.forEach(p=>{
msg+=p.name+" - $"+p.price+"\n";
total+=p.price;
});

msg+="\nTOTAL: $"+total;

/* WhatsApp */
let phone="+93764594322";

window.open(
"https://wa.me/"+phone+"?text="+encodeURIComponent(msg),
"_blank"
);
}

/* AUTH */
window.signup=function(){
createUserWithEmailAndPassword(auth,email.value,pass.value)
.then(()=>alert("Signup OK"))
.catch(e=>alert(e.message));
}

window.login=function(){
signInWithEmailAndPassword(auth,email.value,pass.value)
.then(()=>alert("Login OK"))
.catch(e=>alert(e.message));
}

onAuthStateChanged(auth,(user)=>{
document.getElementById("userStatus").innerText=
user ? "Logged in: "+user.email : "Not logged in";
});

</script>

</body>
</html>
